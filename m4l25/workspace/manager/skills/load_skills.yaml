# Manager workspace 专属 Skills 清单
# 数字员工的能力完全由 Workspace 决定（v3 架构原则）
#
# 加载方式：SkillLoaderTool(skills_dir=workspace/manager/skills)

skills:
  - name: sop_manager
    type: reference   # 参考型：直接注入上下文，不启动沙盒
    enabled: true

  - name: memory-save
    type: task        # 任务型：在沙盒中运行脚本写文件
    enabled: true

  - name: write-output
    type: task        # 任务型：写入工作产出文件（产品规格文档、验收报告、技术设计等）
    enabled: true
